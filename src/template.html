<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,600&display=swap"
        rel="stylesheet">

</head>

<body>
    <main class="app">
        <h1>Weather App</h1>

        <form id="weather-form">
            <input id="location-input" type="text" placeholder="Enter a city" required>

            <button type="submit">Search</button>
        </form>

        <div id="weather-result"></div>

    </main>
</body>

</html>
